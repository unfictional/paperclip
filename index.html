
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Paperclip Calculator with Graph</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 2rem; background-color: #f8f9fa; color: #212529; }
  .container { max-width: 700px; margin: 0 auto; background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  h1 { color: #00509e; }
  .controls { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
  label { font-weight: bold; }
  input[type="number"] { width: 80px; padding: 8px; border-radius: 4px; border: 1px solid #ced4da; }
  button { background-color: #007bff; color: white; padding: 10px 15px; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; transition: background-color 0.2s; }
  button:hover { background-color: #0056b3; }
  #result { margin-top: 20px; padding: 15px; background-color: #e9ecef; border-radius: 4px; border-left: 5px solid #007bff; }
  #result p { margin: 0; }
  #result.error { color: #dc3545; border-left-color: #dc3545;}
  /* Key change for responsiveness: Give the container a defined height */
  .chart-container { 
    margin-top: 25px; 
    position: relative;
    height: 40vh; /* Use viewport height for flexibility */
    width: 100%;
  }
</style>
</head>
<body>

<div class="container">
    <h1>Paperclip Calculator with Graph</h1>
    <p>Enter the number of 10-clip boxes to see the total and plot it on the graph.</p>
    <div class="controls">
        <label for="boxesOf10">Boxes of 10 clips (1-8):</label>
        <input type="number" id="boxesOf10" min="1" max="8" />
        <button id="calculateBtn">Calculate & Plot</button>
    </div>
    <div id="result" style="display: none;"></div>
    <div class="chart-container">
        <canvas id="paperclipChart"></canvas>
    </div>
</div>

<script>
    const calculateBtn = document.getElementById('calculateBtn');
    const resultDiv = document.getElementById('result');
    const input = document.getElementById('boxesOf10');
    const ctx = document.getElementById('paperclipChart').getContext('2d');
    let paperclipChart;

    const allLabels = Array.from({ length: 8 }, (_, i) => i + 1);
    const allData = allLabels.map(x => (111 * x) + 301);

    function initializeChart() {
        if (paperclipChart) {
            paperclipChart.destroy();
        }
        paperclipChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: allLabels,
                datasets: [
                    {
                        label: 'Total Paperclips Trend',
                        data: allData,
                        borderColor: 'rgba(0, 123, 255, 0.5)',
                        backgroundColor: 'rgba(0, 123, 255, 0.1)',
                        fill: false,
                        tension: 0.1
                    },
                    {
                        label: 'Your Selection',
                        data: [],
                        backgroundColor: 'rgba(220, 53, 69, 1)',
                        borderColor: 'rgba(220, 53, 69, 1)',
                        pointRadius: 6,
                        pointHoverRadius: 8,
                        type: 'bubble'
                    }
                ]
            },
            options: {
                // Key changes for responsiveness:
                responsive: true,
                maintainAspectRatio: false,
                
                plugins: {
                    title: {
                        display: true,
                        text: 'Total Paperclips vs. Boxes of 10'
                    }
                },
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: 'Number of Boxes of 10 Clips'
                        }
                    },
                    y: {
                        title: {
                            display: true,
                            text: 'Total Number of Paperclips'
                        },
                        beginAtZero: false
                    }
                }
            }
        });
    }

    calculateBtn.addEventListener('click', () => {
        const boxesOf10 = parseInt(input.value, 10);

        resultDiv.style.display = 'block';
        resultDiv.classList.remove('error');

        if (isNaN(boxesOf10) || boxesOf10 < 1 || boxesOf10 > 8) {
            resultDiv.classList.add('error');
            resultDiv.innerHTML = '<p>Please enter a number between 1 and 8.</p>';
            paperclipChart.data.datasets[1].data = [];
            paperclipChart.update();
            return;
        }

        const boxesOf100 = boxesOf10 + 3;
        const leftovers = boxesOf100 - 2;
        const totalClips = (boxesOf10 * 10) + (boxesOf100 * 100) + leftovers;

        resultDiv.innerHTML = `
            <p><strong>Calculation Breakdown:</strong></p>
            <p>Boxes of 100 clips: ${boxesOf100}</p>
            <p>Leftover clips: ${leftovers}</p>
            <hr>
            <p><strong>Total Paperclips: ${totalClips}</strong></p>
        `;

        paperclipChart.data.datasets[1].data = [{
            x: boxesOf10,
            y: totalClips,
            r: 8
        }];
        paperclipChart.update();
    });

    window.onload = initializeChart;
</script>

</body>
</html>
